services:
  postgres:
    image: postgis/postgis:16-3.4
    environment:
      POSTGRES_DB: e_tady_dokotera
      POSTGRES_USER: dev
      POSTGRES_PASSWORD: dev
      # NOTE: postgis/postgis:16-3.4 ignores this env var and always creates all 4
      # extensions (postgis, fuzzystrmatch, postgis_tiger_geocoder, postgis_topology).
      # The real fix is infra/docker/drop-unused-extensions.sql (initdb script 20-)
      # which drops all 4 so Prisma owns postgis via its migration history.
      # Kept here as documentation intent only.
      POSTGRES_MULTIPLE_EXTENSIONS: postgis
    ports: ["5432:5432"]
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./infra/docker/init-schemas.sql:/docker-entrypoint-initdb.d/01-schemas.sql
      # Runs after PostGIS's own 10_postgis.sh to drop extensions we don't need.
      # This prevents Prisma drift errors caused by extensions outside its control.
      - ./infra/docker/drop-unused-extensions.sql:/docker-entrypoint-initdb.d/20-drop-unused-extensions.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dev -d e_tady_dokotera"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports: ["6379:6379"]
    # noeviction required — allkeys-lru silently drops BullMQ jobs (v1.3 fix)
    command: redis-server --maxmemory 256mb --maxmemory-policy noeviction
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s

  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile.dev
    ports: ["3000:3000"]
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_healthy }
    # Load all vars from .env, then override the two that differ inside Docker:
    # inside the container, "localhost" means the container itself — the services
    # are reachable by their Compose service names instead.
    env_file: .env
    environment:
      DATABASE_URL: "postgresql://dev:dev@postgres:5432/e_tady_dokotera"
      REDIS_HOST: redis
    volumes:
      - ./apps/api/src:/app/src
    command: pnpm dev

  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile.dev
    ports: ["5173:5173"]
    volumes:
      - ./apps/web/src:/app/src
      - ./apps/web/index.html:/app/index.html
    command: pnpm dev

  prisma-studio:
    build:
      context: ./apps/api
      dockerfile: Dockerfile.dev
    ports: ["5555:5555"]
    depends_on:
      postgres: { condition: service_healthy }
    # Reuses the api image (same Dockerfile) — Docker will use its build cache.
    # Only DATABASE_URL is needed; Redis is not used by Prisma Studio.
    env_file: .env
    environment:
      DATABASE_URL: "postgresql://dev:dev@postgres:5432/e_tady_dokotera"
    command: pnpm exec prisma studio --port 5555 --browser none

  # NOTE: Bull Board is NOT a separate container — it runs inside the NestJS app.
  # Access it at http://localhost:3000/admin/queues (password-protected).
  # The deadly0/bull-board Docker image only supports Bull v3/v4 and is
  # INCOMPATIBLE with BullMQ — do not use it.

volumes:
  pgdata:
